# CPU优化配置 - 智谱AI版本
# 适用于无GPU环境,降低并行度以减少资源消耗

# path to the task data directory
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to copy the data to the workspace directory
copy_data: True

exp_name: run

# settings for code execution
exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: True
# LLM settings for final report from journal
report:
  model: glm-4-flash
  temp: 1.0

experiment:
  num_syn_datasets: 1

debug:
  stage4: False

# agent hyperparams - CPU优化
agent:
  type: parallel
  num_workers: 1  # CPU模式降低到1
  stages:
    stage1_max_iters: 10  # 减少迭代次数
    stage2_max_iters: 8
    stage3_max_iters: 8
    stage4_max_iters: 10
  steps: 3  # 减少总步骤数
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 1  # CPU模式降低到1
  expose_prediction: False
  data_preview: False

  # LLM settings for coding
  code:
    model: glm-4-flash  # 使用更快的模型
    temp: 1.0
    max_tokens: 8192  # 减少token数量

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: glm-4-flash
    temp: 0.5
    max_tokens: 4096

  vlm_feedback:
    model: glm-4-flash
    temp: 0.5
    max_tokens: null

  search:
    max_debug_depth: 2  # 减少调试深度
    debug_prob: 0.3
    num_drafts: 1  # 减少草稿数量
