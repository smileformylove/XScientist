# XScientist research-generation config example.
# Copy this file to research_config.yaml and adjust values for local runs.

# ====================
# Basic settings
# ====================

# Output directory override. Leave null to use ai_scientist/config/paths.py:
# RESEARCH_OUTPUT_DIR > AI_SCIENTIST_OUTPUT_DIR > sibling <repo-name>_outputs.
# For this repository, the default sibling path is ../XScientist_outputs.
research_dir: null

# Use a custom batch name, or null to use a timestamp.
custom_batch_name: null

# ====================
# Ideation settings
# ====================

ideation:
  # Number of ideas to generate.
  num_ideas: 5

  # Reflection rounds per idea.
  num_reflections: 5

  # Ideation model.
  model: "glm-4-flash"

  # Topic file for topic-based runs.
  topic_file: "examples/example_topic.md"

  # Existing ideas file. Set to null when using topic_file.
  ideas_file: null

# ====================
# Paper type settings
# ====================

# Supported CLI paper types: icbinb, normal, journal, extended.
paper_types:
  - "icbinb"
  - "normal"
  - "journal"
  - "extended"

# Generate every supported type.
all_types: false

# Optional venue intent: neurips, iclr, cvpr, journal, or nature.
target_venue: null
auto_adjust_paper_type: false

# ====================
# Parallel execution
# ====================

parallel:
  enabled: false
  num_workers: 2

# ====================
# Model configuration
# ====================

models:
  ideation: "glm-4-flash"
  agg_plots: "glm-4-flash"
  writeup: "glm-4-plus"
  writeup_small: "glm-4-air"
  citation: "glm-4-air"
  review: "glm-4-plus"

# ====================
# Writing and review
# ====================

writing:
  num_cite_rounds: 15
  writeup_retries: 3
  improvement_rounds: 1
  review_strategy: null

# Idea indices to process. Use null for all selected ideas.
idea_indices: null

# ====================
# Advanced settings
# ====================

advanced:
  experiment_timeout: 3600
  latex_timeout: 30
  cleanup_temp_files: true
  save_experiment_logs: true
